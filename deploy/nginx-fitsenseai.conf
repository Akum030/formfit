# Nginx config for fitsenseai.aidhunik.com
# Place at: /etc/nginx/sites-available/fitsenseai.aidhunik.com
# Enable: ln -s /etc/nginx/sites-available/fitsenseai.aidhunik.com /etc/nginx/sites-enabled/
# SSL: certbot --nginx -d fitsenseai.aidhunik.com

upstream repsensei_frontend {
    server 127.0.0.1:3000;
}

upstream repsensei_backend {
    server 127.0.0.1:4000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name fitsenseai.aidhunik.com;
    return 301 https://$host$request_uri;
}

# HTTPS main server
server {
    listen 443 ssl http2;
    server_name fitsenseai.aidhunik.com;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/fitsenseai.aidhunik.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fitsenseai.aidhunik.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Increase body size for audio WebSocket frames
    client_max_body_size 10M;

    # ── WebSocket voice endpoint ───────────────────────────────
    location /ws/ {
        proxy_pass         http://repsensei_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;   # keep WS open for full workout session
        proxy_send_timeout 86400s;
    }

    # ── REST API endpoints ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://repsensei_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Health check ───────────────────────────────────────────
    location /health {
        proxy_pass         http://repsensei_backend;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Frontend (React SPA) ───────────────────────────────────
    location / {
        proxy_pass         http://repsensei_frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SPA fallback — forward 404s from nginx to the app
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://repsensei_frontend;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg|ttf|otf)$ {
        proxy_pass         http://repsensei_frontend;
        proxy_set_header   Host $host;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }
}
