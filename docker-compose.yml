services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=file:./data/dev.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME:-gemini-2.0-flash}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - SARVAM_STT_ENDPOINT=${SARVAM_STT_ENDPOINT:-https://api.sarvam.ai/speech-to-text}
      - SARVAM_TTS_ENDPOINT=${SARVAM_TTS_ENDPOINT:-https://api.sarvam.ai/text-to-speech}
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
